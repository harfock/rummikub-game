<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔力橋樂齡版 | Rummikub Senior</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div id="language-toggle">
            <button onclick="setLanguage('zh-tw')">中文</button>
            <button onclick="setLanguage('en')">English</button>
        </div>
        <div id="profile-area">
            <span id="welcome-text">歡迎!</span>
            <select id="user-profile" onchange="switchProfile()">
                <option value="default">預設玩家</option>
                </select>
        </div>
    </header>

    <main id="main-menu">
        <h1 id="game-title">魔力橋樂齡版</h1>
        
        <section id="rules-box">
            <h2 id="rules-header">遊戲規則</h2>
            <p id="rules-content">載入中...</p>
        </section>

        <div class="menu-actions">
            <button class="btn-large" onclick="initGame()" id="start-btn">開始遊戲</button>
            <button class="btn-large secondary" onclick="viewRanking()" id="rank-btn">排行榜</button>
        </div>
    </main>

    <div id="game-screen" style="display:none;">
        <div id="game-status">
            <h2 id="feedback-msg">加油！輪到您了。</h2>
            <button class="btn-save" onclick="saveGameProgress()">儲存並退出</button>
            <div id="ai-status-container" style="display: flex; justify-content: space-around; background: #fff; padding: 10px; border-radius: 10px; margin-bottom: 10px;">
                <div id="ai-1-count">電腦 1: 14 張</div>
                <div id="ai-2-count">電腦 2: 14 張</div>
                <div id="ai-3-count">電腦 3: 14 張</div>
                <div id="deck-count" style="font-weight: bold; color: #d32f2f;">剩餘牌數: 80</div>
            </div>
        </div>

        <div id="game-table">
            <div id="common-area">
                </div>
        </div>

       <div id="player-hand-container">
    <div class="hand-header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px;">
        <h3>您的牌面：</h3>
        <div class="sort-btns">
            <button onclick="sortHand('num')" class="btn-action">數字排序</button>
            <button onclick="sortHand('color')" class="btn-action">顏色排序</button>
            <button onclick="recallAllTiles()" class="btn-action" style="background: #f44336;">全部收回</button>
        </div>
    </div>
    <div id="player-tiles"></div>
</div>

        <nav id="action-bar">
            <button class="btn-action btn-hint" onclick="showHint()">提示幫助 (Hint)</button>
            <button class="btn-action btn-draw" onclick="playerDrawTile()">抽一張牌</button>
            <button class="btn-action btn-play" onclick="endTurn()" id="pass-btn">結束回合 (Pass)</button>
        </nav>
    </div>
    <div id="player-hand-container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>您的牌面：</h3>
        <div class="sort-controls">
            <button onclick="sortHand('number')" class="btn-action" style="padding: 5px 15px; font-size: 1rem;">按數字排序</button>
            <button onclick="sortHand('color')" class="btn-action" style="padding: 5px 15px; font-size: 1rem;">按顏色排序</button>
        </div>
    </div>
    <div id="player-tiles"></div>
</div>

    
    <script src="js/storage.js"></script>
       <script src="js/game.js"></script>
     <script src="js/ui.js"></script>
</body>
</html>
