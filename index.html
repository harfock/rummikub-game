<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔力橋樂齡版 | Rummikub Senior</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div id="language-toggle">
            <button onclick="setLanguage('zh-tw')">中文</button>
            <button onclick="setLanguage('en')">English</button>
        </div>
        <div id="profile-area">
            <span id="welcome-text">歡迎!</span>
            <select id="user-profile" onchange="switchProfile()">
                <option value="default">預設玩家</option>
                </select>
        </div>
    </header>

    <main id="main-menu">
        <h1 id="game-title">魔力橋樂齡版</h1>
        
        <section id="rules-box">
            <h2 id="rules-header">遊戲規則</h2>
            <p id="rules-content">載入中...</p>
        </section>

        <div class="menu-actions">
            <button class="btn-large" onclick="initGame()" id="start-btn">開始遊戲</button>
            <button class="btn-large secondary" onclick="viewRanking()" id="rank-btn">排行榜</button>
        </div>
    </main>

    <div id="game-screen" style="display:none;">
        <div id="game-status">
            <h2 id="feedback-msg">加油！輪到您了。</h2>
            <button class="btn-save" onclick="saveGameProgress()">儲存並退出</button>
        </div>

        <div id="game-table">
            <div id="common-area">
                </div>
        </div>

        <div id="player-hand-container">
            <h3>您的牌面：</h3>
            <div id="player-tiles">
                </div>
        </div>

        <nav id="action-bar">
            <button class="btn-action btn-hint" onclick="showHint()">提示幫助 (Hint)</button>
            <button class="btn-action btn-draw" onclick="playerDrawTile()">抽一張牌</button>
            <button class="btn-action btn-play" onclick="submitMove()">完成出牌</button>
        </nav>
    </div>

    <script src="js/storage.js"></script>
       <script src="js/game.js"></script>
     <script src="js/ui.js"></script>
</body>
</html>
